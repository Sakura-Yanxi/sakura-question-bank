<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" role="img" aria-labelledby="title desc">
  <title id="title">Sakura Study logo</title>
  <desc id="desc">Horizontal Sakura Study OS logo for the question bank application.</desc>
  <defs>
    <linearGradient id="markBg" x1="22" y1="18" x2="222" y2="230" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F178A9"/>
      <stop offset="0.52" stop-color="#EC4899"/>
      <stop offset="1" stop-color="#DB2777"/>
    </linearGradient>
    <linearGradient id="word" x1="284" y1="74" x2="730" y2="176" gradientUnits="userSpaceOnUse">
      <stop stop-color="#20242E"/>
      <stop offset="1" stop-color="#DB2777"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#DB2777" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="32" y="28" width="224" height="224" rx="58" fill="url(#markBg)"/>
    <path d="M95 79h72l33 35v107H95c-12 0-22-10-22-22V101c0-12 10-22 22-22z" fill="#FFFFFF"/>
    <path d="M167 79v26c0 9 7 16 16 16h17l-33-42z" fill="#FCE7F1"/>
    <text x="136" y="176" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="850" fill="#DB2777">Σ</text>
    <path d="M111 197l18 18 43-48" fill="none" stroke="#10B981" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="300" y="118" font-family="Inter, 'Microsoft YaHei', Arial, sans-serif" font-size="56" font-weight="850" fill="url(#word)">Sakura 做题集</text>
  <text x="304" y="164" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="3" fill="#EC4899">SAKURA STUDY OS</text>
  <text x="304" y="205" font-family="Inter, 'Microsoft YaHei', Arial, sans-serif" font-size="24" font-weight="600" fill="#6B7280">Question Bank · Mistake Review · AI Reflection</text>
