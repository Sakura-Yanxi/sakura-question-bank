    <text x="248" y="324" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="148" font-weight="850" fill="#DB2777">Σ</text>
    <path d="M201 361l31 30 75-83" fill="none" stroke="#10B981" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

