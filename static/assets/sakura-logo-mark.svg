<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Sakura Study logo mark</title>
  <desc id="desc">A sakura-pink study mark with a math page, sigma symbol, and review check.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="64" x2="448" y2="456" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F178A9"/>
      <stop offset="0.52" stop-color="#EC4899"/>
      <stop offset="1" stop-color="#DB2777"/>
    </linearGradient>
    <linearGradient id="page" x1="154" y1="122" x2="360" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF7FB"/>
    </linearGradient>
    <filter id="softShadow" x="-25%" y="-20%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#8F1358" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect x="28" y="28" width="456" height="456" rx="120" fill="url(#bg)"/>
  <path d="M132 390c46 34 142 47 244 9 35-13 55-36 66-63 7 67-32 119-100 139-82 24-181 3-242-47-13-11-7-31 12-34 7-1 14 1 20 6z" fill="#C91D72" opacity="0.16"/>

