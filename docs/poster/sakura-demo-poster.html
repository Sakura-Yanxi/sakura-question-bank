<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sakura 做题集 Demo 宣传海报</title>
    <style>
      :root {
        --ink: #1f2937;
        --muted: #64748b;
        --line: #e2e8f0;
        --paper: #fff9fc;
        --sakura: #ec4899;
        --sakura-deep: #be185d;
        --teal: #14b8a6;
        --amber: #f59e0b;
        --blue: #2563eb;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #eef2f7;
        font-family: Inter, "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
        color: var(--ink);
      }

      .poster {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background:
          radial-gradient(circle at 88% 8%, rgba(20, 184, 166, 0.18), transparent 28%),
          radial-gradient(circle at 8% 18%, rgba(236, 72, 153, 0.18), transparent 30%),
          linear-gradient(180deg, #fff, var(--paper) 58%, #f8fbff);
        box-shadow: 0 28px 80px rgba(15, 23, 42, 0.22);
      }

      .poster::before {
        content: "";
        position: absolute;
        inset: 46px;
        border: 2px solid rgba(236, 72, 153, 0.16);
        border-radius: 42px;
        pointer-events: none;
      }

      .poster::after {
        content: "";
        position: absolute;
        right: -160px;
        bottom: -180px;
        width: 640px;
        height: 640px;
        border-radius: 50%;
        border: 80px solid rgba(236, 72, 153, 0.08);
      }

      .content {
        position: relative;
        z-index: 1;
        height: 100%;
        padding: 72px 78px 64px;
        display: flex;
        flex-direction: column;
      }

      .topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 28px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 18px;
      }

      .brand-icon {
        width: 96px;
        height: 94px;
        display: block;
        border-radius: 28px;
        box-shadow: 0 18px 38px rgba(190, 24, 93, 0.18);
      }

      .brand strong {
        display: block;
        font-size: 42px;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .brand span {
        display: block;
        margin-top: 8px;
        color: var(--sakura);
        font-size: 21px;
        font-weight: 850;
        letter-spacing: 7px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 52px;
        padding: 0 24px;
        border: 1px solid rgba(20, 184, 166, 0.22);
        border-radius: 999px;
        background: rgba(240, 253, 250, 0.9);
        color: #0f766e;
        font-size: 20px;
        font-weight: 850;
      }

      .hero {
        margin-top: 104px;
        max-width: 910px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--sakura-deep);
        font-size: 22px;
        font-weight: 900;
        letter-spacing: 0;
      }

      .eyebrow::before {
        content: "";
        width: 34px;
        height: 4px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--sakura), var(--teal));
      }

      h1 {
        margin: 28px 0 0;
        font-size: 86px;
        line-height: 1.08;
        letter-spacing: 0;
        color: #111827;
      }

      h1 em {
        color: var(--sakura-deep);
        font-style: normal;
      }

      .subtitle {
        margin: 34px 0 0;
        max-width: 820px;
        color: #475569;
        font-size: 32px;
        line-height: 1.55;
        font-weight: 650;
      }

      .mockup {
        margin-top: 72px;
        position: relative;
        height: 520px;
        border-radius: 34px;
        padding: 18px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(226, 232, 240, 0.9);
        box-shadow: 0 24px 64px rgba(15, 23, 42, 0.12);
      }

      .browser-frame {
        height: 100%;
        border-radius: 24px;
        overflow: hidden;
        background: #fff;
        border: 1px solid var(--line);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.78);
        display: grid;
        grid-template-rows: 44px 1fr;
      }

      .browser-top {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 18px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, #fff, #f8fafc);
        color: var(--muted);
        font-size: 15px;
        font-weight: 850;
      }

      .browser-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #f9a8d4;
      }

      .browser-dot:nth-child(2) { background: #facc15; }
      .browser-dot:nth-child(3) { background: #14b8a6; }

      .browser-title {
        margin-left: 8px;
        color: #475569;
      }

      .frontpage-shot {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        object-position: top left;
      }

      .window {
        height: 100%;
        border-radius: 24px;
        overflow: hidden;
        background: #fff;
        border: 1px solid var(--line);
        display: grid;
        grid-template-columns: 180px 1fr;
      }

      .side {
        background: linear-gradient(180deg, #fff7fb, #f8fafc);
        border-right: 1px solid var(--line);
        padding: 24px 18px;
        display: grid;
        align-content: start;
        gap: 12px;
      }

      .side-pill {
        height: 34px;
        border-radius: 999px;
        background: #fff;
        border: 1px solid #fbcfe8;
      }

      .side-pill.active {
        background: linear-gradient(90deg, var(--sakura), #f472b6);
        border-color: transparent;
      }

      .dash {
        padding: 28px;
        display: grid;
        grid-template-rows: 76px 1fr;
        gap: 20px;
      }

      .dash-head {
        display: grid;
        grid-template-columns: 1fr 220px;
        gap: 18px;
      }

      .dash-title, .dash-search, .card, .chart, .note {
        border-radius: 18px;
        background: #f8fafc;
        border: 1px solid var(--line);
      }

      .dash-title {
        padding: 16px 18px;
      }

      .line {
        height: 12px;
        border-radius: 999px;
        background: #cbd5e1;
        margin-bottom: 12px;
      }

      .line.hot { width: 56%; background: #f9a8d4; }
      .line.mid { width: 82%; }
      .line.small { width: 42%; }

      .dash-search {
        display: grid;
        place-items: center;
        color: var(--muted);
        font-weight: 800;
      }

      .dash-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 130px 1fr;
        gap: 18px;
      }

      .card {
        padding: 18px;
      }

      .card .num {
        color: var(--sakura-deep);
        font-size: 42px;
        line-height: 1;
        font-weight: 950;
      }

      .card .label {
        margin-top: 12px;
        color: var(--muted);
        font-size: 16px;
        font-weight: 800;
      }

      .chart {
        grid-column: span 1;
        padding: 22px;
        display: grid;
        align-content: end;
        gap: 12px;
      }

      .bar {
        height: 18px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--sakura) var(--w), #e2e8f0 0);
      }

      .note {
        padding: 22px;
        display: grid;
        align-content: start;
        gap: 12px;
      }

      .note-chip {
        width: max-content;
        border-radius: 999px;
        padding: 8px 12px;
        background: #ecfeff;
        color: #0e7490;
        font-size: 14px;
        font-weight: 900;
      }

      .features {
        margin-top: 70px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
      }

      .feature {
        min-height: 192px;
        padding: 26px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(226, 232, 240, 0.94);
        box-shadow: 0 14px 36px rgba(15, 23, 42, 0.06);
      }

      .feature-icon {
        width: 50px;
        height: 50px;
        border-radius: 16px;
        display: grid;
        place-items: center;
        color: #fff;
        font-size: 26px;
        font-weight: 950;
      }

      .feature:nth-child(1) .feature-icon { background: var(--sakura); }
      .feature:nth-child(2) .feature-icon { background: var(--teal); }
      .feature:nth-child(3) .feature-icon { background: var(--blue); }

      .feature h2 {
        margin: 18px 0 8px;
        font-size: 26px;
        line-height: 1.25;
      }

      .feature p {
        margin: 0;
        color: var(--muted);
        font-size: 19px;
        line-height: 1.5;
        font-weight: 650;
      }

      .footer {
        margin-top: auto;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 28px;
        padding-top: 54px;
      }

      .slogan {
        max-width: 610px;
        font-size: 30px;
        line-height: 1.45;
        font-weight: 900;
      }

      .slogan span {
        color: var(--sakura-deep);
      }

      .qr-card {
        width: 218px;
        min-height: 218px;
        border-radius: 30px;
        background: #fff;
        border: 1px solid var(--line);
        box-shadow: 0 20px 44px rgba(15, 23, 42, 0.1);
        padding: 22px;
        display: grid;
        place-items: center;
        text-align: center;
      }

      .qr-grid {
        width: 122px;
        height: 122px;
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 5px;
      }

      .qr-grid i {
        display: block;
        border-radius: 4px;
        background: #111827;
      }

      .qr-card small {
        display: block;
        margin-top: 14px;
        color: var(--muted);
        font-size: 16px;
        font-weight: 800;
      }

      .entry-icon {
        width: 112px;
        height: 110px;
        border-radius: 30px;
        box-shadow: 0 18px 38px rgba(190, 24, 93, 0.18);
      }

      .petals {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .petal {
        position: absolute;
        width: 32px;
        height: 20px;
        border-radius: 70% 30% 70% 30%;
        background: rgba(236, 72, 153, 0.18);
        transform: rotate(var(--r));
      }

      .p1 { top: 210px; right: 130px; --r: 24deg; }
      .p2 { top: 360px; right: 70px; --r: -18deg; width: 24px; }
      .p3 { bottom: 360px; left: 74px; --r: 38deg; }
      .p4 { bottom: 170px; right: 360px; --r: -30deg; width: 26px; }
    </style>
  </head>
  <body>
    <main class="poster" role="img" aria-label="Sakura 做题集 Demo 宣传海报">
      <div class="petals"><i class="petal p1"></i><i class="petal p2"></i><i class="petal p3"></i><i class="petal p4"></i></div>
      <section class="content">
        <div class="topline">
          <div class="brand">
            <img class="brand-icon" src="assets/sakura-logo-app-icon.png" alt="Sakura 做题集 logo" />
            <div>
              <strong>Sakura 做题集</strong>
              <span>SAKURA STUDY</span>
            </div>
          </div>
          <div class="badge">个人学习 Demo</div>
        </div>

        <section class="hero">
          <div class="eyebrow">PDF 题库 · 错题复盘 · AI 教练</div>
          <h1>把做过的题，<br />变成会成长的<em>学习档案</em></h1>
          <p class="subtitle">本地优先保存题图、状态、错因和复习节奏；只在需要讲解、变式、反思和教材精读时调用 AI。</p>
        </section>

        <section class="mockup" aria-hidden="true">
          <div class="browser-frame">
            <div class="browser-top">
              <i class="browser-dot"></i><i class="browser-dot"></i><i class="browser-dot"></i>
              <span class="browser-title">Sakura 做题集 · 前端主页面</span>
            </div>
            <img class="frontpage-shot" src="assets/sakura-main-page.png" alt="Sakura 做题集前端主页面截图" />
          </div>
        </section>

        <section class="features">
          <article class="feature">
            <div class="feature-icon">1</div>
            <h2>资料沉淀</h2>
            <p>PDF 做题本、模拟卷、教材精读统一归档。</p>
          </article>
          <article class="feature">
            <div class="feature-icon">2</div>
            <h2>复习闭环</h2>
            <p>错因标签、间隔复习、每日练习持续回流。</p>
          </article>
          <article class="feature">
            <div class="feature-icon">3</div>
            <h2>AI 讲解</h2>
            <p>基于真实做题证据生成提示、解析和计划。</p>
          </article>
        </section>

        <footer class="footer">
          <div class="slogan">做过的不浪费，错过的不遗漏。<br /><span>Sakura</span> 让每一次练习都留下证据。</div>
          <div class="qr-card" aria-hidden="true">
            <img class="entry-icon" src="assets/sakura-logo-app-icon.png" alt="" />
            <small>扫码/部署后替换入口</small>
          </div>
        </footer>
      </section>
    </main>
  </body>
</html>
